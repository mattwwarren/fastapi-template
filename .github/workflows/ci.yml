# ci.yml - CI workflow for running pre-commit checks and tests
#
# This workflow runs on all PRs to main and ensures code quality
# through pre-commit hooks and the full test suite.
#
# Tests use pytest-docker which automatically starts Postgres via
# tests/docker-compose.yml - no k3d/DevSpace needed in CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: |
          uv run pytest fastapi_template/tests/unit/ \
            -v --tb=short -o "addopts=" \
            --cov=fastapi_template --cov-report=term-missing

      - name: Rename coverage data
        if: always()
        run: mv .coverage .coverage.unit

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: .coverage.unit
          include-hidden-files: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: |
          uv run pytest fastapi_template/tests/integration/ \
            -v --tb=short -n auto -o "addopts=" \
            --cov=fastapi_template --cov-report=term-missing

      - name: Rename coverage data
        if: always()
        run: mv .coverage .coverage.integration

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: .coverage.integration
          include-hidden-files: true

  coverage:
    name: Coverage Check
    needs: [unit-tests, integration-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Combine coverage and check threshold
        run: |
          uv run coverage combine .coverage.unit .coverage.integration
          uv run coverage report --fail-under=90
